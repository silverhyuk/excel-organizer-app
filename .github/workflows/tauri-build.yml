name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*' # Trigger build when pushing a version tag like v0.1.0
  workflow_dispatch: # Enable manual run from GitHub actions tab

jobs:
  release:
    permissions:
      contents: write
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest' # Build for Windows (.exe / .msi)
            args: ''
          - platform: 'macos-latest' # Build for macOS (.app / .dmg)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners to build swift/metal things if needed
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Rust/Tauri cache)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Import macOS signing certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        shell: bash
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          SIGNING_IDENTITY=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          test -n "$SIGNING_IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Import Windows signing certificate
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path certificate | Out-Null
          [IO.File]::WriteAllBytes("certificate/certificate.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $certificate = Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          $config = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $windows = [ordered]@{
            certificateThumbprint = $certificate.Thumbprint
            digestAlgorithm = "sha256"
            timestampUrl = "http://timestamp.digicert.com"
          }
          $config.bundle | Add-Member -Force -NotePropertyName windows -NotePropertyValue $windows
          $config | ConvertTo-Json -Depth 100 | Set-Content src-tauri/tauri.conf.json

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '딸깍 정리기 ${{ github.ref_name }}'
          releaseBody: '자동 빌드된 데스크톱 설치 파일입니다.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
