name: Build and Release Desktop App

on:
  push:
    tags:
      - 'v*' # Trigger build when pushing a version tag like v0.1.0
  workflow_dispatch: # Enable manual run from GitHub actions tab

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest' # Build for Windows (.exe / .msi)
            args: ''
          - platform: 'macos-latest' # Build for macOS (.app / .dmg)
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners to build swift/metal things if needed
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Rust/Tauri cache)
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and Package Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '딸깍 정리기 ${{ github.ref_name }}'
          releaseBody: '자동 빌드된 데스크톱 설치 파일입니다.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
